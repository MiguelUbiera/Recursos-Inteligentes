<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider Interactivo - Números Irracionales</title>
    <style>
        :root {
            /* Paleta de colores accesible y suave */
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --bg-track: #e2e8f0;
            --bg-thumb: #3b82f6;
            --bg-thumb-hover: #2563eb;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-on-accent: #ffffff;
            --accent-success: #22c55e;
            --accent-purple: #8b5cf6;
            --accent-teal: #14b8a6;
            --border-soft: #cbd5e1;
            --shadow-soft: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-medium: 0 4px 14px rgba(0, 0, 0, 0.09);
            --focus-ring: 0 0 0 3px rgba(59, 130, 246, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Encabezado institucional */
        header {
            text-align: center;
            padding: 20px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 700px;
        }

        .institution {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-purple);
            margin-bottom: 6px;
        }

        .course-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .course-info span {
            background: var(--bg-card);
            padding: 5px 14px;
            border-radius: 16px;
            font-weight: 500;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-soft);
        }

        /* Contenedor principal */
        .slider-container {
            width: 100%;
            max-width: 700px;
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-medium);
            border: 2px solid var(--border-soft);
        }

        /* Título del slider */
        .slider-title {
            text-align: center;
            margin-bottom: 25px;
        }

        .slider-title h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .slider-title p {
            color: var(--text-secondary);
            font-size: 1.05rem;
        }

        /* Área de contenido dinámico */
        .content-display {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            border: 2px solid var(--border-soft);
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: background-color 0.3s ease;
        }

        .content-level {
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        .level-badge {
            display: inline-block;
            background: var(--accent-purple);
            color: var(--text-on-accent);
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .content-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .content-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 18px;
            line-height: 1.5;
        }

        /* Ejemplo matemático */
        .math-example {
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            margin: 15px 0;
            border-left: 4px solid var(--accent-teal);
            font-family: 'Cambria Math', 'Times New Roman', serif;
            font-size: 1.25rem;
            text-align: center;
            line-height: 2;
            box-shadow: var(--shadow-soft);
        }

        .fraction {
            display: inline-block;
            text-align: center;
            vertical-align: middle;
            margin: 0 3px;
        }

        .fraction .numerator {
            border-bottom: 2px solid var(--text-primary);
            display: block;
            padding: 0 5px 2px;
        }

        .fraction .denominator {
            display: block;
            padding: 2px 5px 0;
        }

        .radical {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .radical-symbol {
            font-size: 1.5rem;
            position: relative;
            top: -3px;
        }

        .radical-content {
            border-top: 2px solid var(--text-primary);
            padding: 0 8px 2px;
            position: relative;
            top: -4px;
            font-size: 1.1rem;
        }

        /* Indicador visual de nivel */
        .visual-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .indicator-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--border-soft);
            transition: all 0.2s ease;
        }

        .indicator-dot.active {
            background: var(--accent-purple);
            transform: scale(1.3);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
        }

        /* Controles del slider */
        .slider-controls {
            margin: 25px 0 15px;
        }

        .slider-track {
            position: relative;
            height: 8px;
            background: var(--bg-track);
            border-radius: 4px;
            cursor: pointer;
            margin: 25px 0;
        }

        .slider-progress {
            position: absolute;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-teal));
            border-radius: 4px;
            width: 0%;
            transition: width 0.15s ease;
        }

        .slider-thumb {
            position: absolute;
            width: 28px;
            height: 28px;
            background: var(--bg-thumb);
            border: 3px solid white;
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            box-shadow: var(--shadow-medium);
            transition: background 0.2s ease, transform 0.1s ease;
            z-index: 2;
        }

        .slider-thumb:hover {
            background: var(--bg-thumb-hover);
            transform: translate(-50%, -50%) scale(1.05);
        }

        .slider-thumb:active {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .slider-thumb:focus {
            outline: none;
            box-shadow: var(--focus-ring), var(--shadow-medium);
        }

        /* Marcadores de niveles */
        .slider-markers {
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
            margin-top: 8px;
        }

        .marker {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .marker-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border-soft);
            border: 2px solid white;
            box-shadow: 0 0 0 2px var(--bg-track);
        }

        .marker-dot.active {
            background: var(--accent-purple);
        }

        .marker-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-align: center;
            width: 40px;
        }

        /* Botones de navegación */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .nav-btn {
            padding: 12px 24px;
            background: var(--bg-primary);
            border: 2px solid var(--border-soft);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--accent-purple);
            background: #f5f3ff;
            transform: translateY(-2px);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-btn:focus {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        /* Animaciones suaves */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Accesibilidad: foco visible */
        .slider-track:focus {
            outline: none;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .slider-container {
                padding: 22px 18px;
                border-radius: 16px;
            }
            
            .content-title {
                font-size: 1.3rem;
            }
            
            .content-text {
                font-size: 1rem;
            }
            
            .math-example {
                font-size: 1.1rem;
                padding: 14px 16px;
            }
            
            .slider-thumb {
                width: 24px;
                height: 24px;
            }
            
            .marker-label {
                font-size: 0.75rem;
                width: 35px;
            }
        }

        /* Preferencias de movimiento reducido */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Estado de arrastre */
        .slider-container.dragging .slider-thumb {
            cursor: grabbing;
        }
    </style>
</head>
<body>
    <!-- Encabezado institucional -->
    <header>
        <div class="institution">Instituto para Sordos Santa Rosa</div>
        <div class="course-info">
            <span>🎓 Primero de Secundaria</span>
            <span>📐 Matemáticas</span>
            <span>👨‍🏫 Profesor Miguel</span>
        </div>
    </header>

    <!-- Contenedor del slider interactivo -->
    <main class="slider-container" id="sliderContainer">
        
        <div class="slider-title">
            <h2>Explora: Números Irracionales</h2>
            <p>Desliza el control para avanzar paso a paso</p>
        </div>

        <!-- Área de contenido dinámico -->
        <div class="content-display" id="contentDisplay" role="region" aria-live="polite" aria-label="Contenido del nivel actual">
            <div class="content-level" id="contentLevel">
                <!-- El contenido se actualiza con JavaScript -->
            </div>
        </div>

        <!-- Controles del slider -->
        <div class="slider-controls">
            <div class="slider-track" id="sliderTrack" role="slider" aria-label="Nivel de aprendizaje" 
                 aria-valuemin="0" aria-valuemax="4" aria-valuenow="0" tabindex="0">
                <div class="slider-progress" id="sliderProgress"></div>
                <div class="slider-thumb" id="sliderThumb" aria-hidden="true"></div>
            </div>
            
            <!-- Marcadores de niveles -->
            <div class="slider-markers" aria-hidden="true">
                <div class="marker"><div class="marker-dot" id="marker-0"></div><span class="marker-label">Inicio</span></div>
                <div class="marker"><div class="marker-dot" id="marker-1"></div><span class="marker-label">Qué son</span></div>
                <div class="marker"><div class="marker-dot" id="marker-2"></div><span class="marker-label">Ejemplos</span></div>
                <div class="marker"><div class="marker-dot" id="marker-3"></div><span class="marker-label">Propiedades</span></div>
                <div class="marker"><div class="marker-dot" id="marker-4"></div><span class="marker-label">Aplicación</span></div>
            </div>
        </div>

        <!-- Indicadores visuales de posición -->
        <div class="visual-indicator" aria-hidden="true">
            <div class="indicator-dot" id="dot-0"></div>
            <div class="indicator-dot" id="dot-1"></div>
            <div class="indicator-dot" id="dot-2"></div>
            <div class="indicator-dot" id="dot-3"></div>
            <div class="indicator-dot" id="dot-4"></div>
        </div>

        <!-- Botones de navegación -->
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" aria-label="Nivel anterior">← Anterior</button>
            <button class="nav-btn" id="nextBtn" aria-label="Siguiente nivel">Siguiente →</button>
        </div>

    </main>

    <script>
        // ============================================
        // DATOS DEL SLIDER - 5 NIVELES DE APRENDIZAJE
        // ============================================
        const sliderLevels = [
            {
                level: 1,
                badge: "Nivel 1 • Repaso",
                title: "Números Racionales",
                text: "Son los que SÍ pueden escribirse como fracción de dos enteros. Sus decimales son finitos o se repiten.",
                example: `<span class="fraction"><span class="numerator">1</span><span class="denominator">2</span></span> = 0.5<br>
                          <span class="fraction"><span class="numerator">3</span><span class="denominator">4</span></span> = 0.75<br>
                          <span class="fraction"><span class="numerator">1</span><span class="denominator">3</span></span> = 0.333...`,
                bgColor: "#f0f9ff",
                accentColor: "#3b82f6"
            },
            {
                level: 2,
                badge: "Nivel 2 • Nuevo concepto",
                title: "¿Qué son los Irracionales?",
                text: "Son números que NO pueden escribirse como fracción. Sus decimales son infinitos y NUNCA se repiten.",
                example: `√2 = 1.4142135...<br>
                          π = 3.1415926...<br>
                          e = 2.7182818...`,
                bgColor: "#fdf4ff",
                accentColor: "#8b5cf6"
            },
            {
                level: 3,
                badge: "Nivel 3 • Ejemplos clave",
                title: "Ejemplos Importantes",
                text: "Estos números irracionales aparecen en geometría, naturaleza y ciencia:",
                example: `√(2·3) = √6 ≈ 2.449<br>
                          √(5·2) = √10 ≈ 3.162<br>
                          π = Circunferencia ÷ Diámetro`,
                bgColor: "#f0fdfa",
                accentColor: "#14b8a6"
            },
            {
                level: 4,
                badge: "Nivel 4 • Propiedades",
                title: "Reglas de Operaciones",
                text: "Propiedades útiles para trabajar con radicales irracionales:",
                example: `√(a·b) = √a · √b<br>
                          <span class="fraction">
                            <span class="numerator">√a</span>
                            <span class="denominator">√b</span>
                          </span> = √<span class="fraction">
                            <span class="numerator">a</span>
                            <span class="denominator">b</span>
                          </span><br>
                          √(a²) = |a|`,
                bgColor: "#fef3c7",
                accentColor: "#f59e0b"
            },
            {
                level: 5,
                badge: "Nivel 5 • Aplicación",
                title: "¿Dónde los usamos?",
                text: "Los irracionales aparecen en situaciones reales de geometría y medición:",
                example: `Diagonal cuadrado: d = √(2·l²) = l·√2<br>
                          Circunferencia: C = 2·π·r<br>
                          Triángulo: altura = √(3)·l ÷ 2`,
                bgColor: "#dcfce7",
                accentColor: "#22c55e"
            }
        ];

        // ============================================
        // ESTADO Y ELEMENTOS DEL DOM
        // ============================================
        let currentLevel = 0;
        let isDragging = false;
        let startX = 0;
        let startLeft = 0;

        const sliderContainer = document.getElementById('sliderContainer');
        const sliderTrack = document.getElementById('sliderTrack');
        const sliderProgress = document.getElementById('sliderProgress');
        const sliderThumb = document.getElementById('sliderThumb');
        const contentDisplay = document.getElementById('contentDisplay');
        const contentLevel = document.getElementById('contentLevel');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // ============================================
        // FUNCIONES PRINCIPALES
        // ============================================

        // Renderizar contenido del nivel actual
        function renderLevel(index) {
            const level = sliderLevels[index];
            
            // Actualizar contenido
            contentLevel.innerHTML = `
                <div class="level-badge">${level.badge}</div>
                <h3 class="content-title">${level.title}</h3>
                <p class="content-text">${level.text}</p>
                <div class="math-example">${level.example}</div>
            `;
            
            // Actualizar colores del contenedor
            contentDisplay.style.backgroundColor = level.bgColor;
            
            // Actualizar indicadores visuales
            updateIndicators(index);
            
            // Actualizar estado de botones
            prevBtn.disabled = (index === 0);
            nextBtn.disabled = (index === sliderLevels.length - 1);
            
            // Actualizar atributos ARIA para accesibilidad
            sliderTrack.setAttribute('aria-valuenow', index);
            sliderTrack.setAttribute('aria-label', `Nivel ${index + 1} de ${sliderLevels.length}: ${level.title}`);
        }

        // Actualizar indicadores de posición
        function updateIndicators(index) {
            // Actualizar barra de progreso
            const progressPercent = (index / (sliderLevels.length - 1)) * 100;
            sliderProgress.style.width = `${progressPercent}%`;
            
            // Actualizar posición del thumb
            const trackRect = sliderTrack.getBoundingClientRect();
            const thumbPosition = (index / (sliderLevels.length - 1)) * trackRect.width;
            sliderThumb.style.left = `${thumbPosition}px`;
            
            // Actualizar marcadores y dots
            for (let i = 0; i < sliderLevels.length; i++) {
                const markerDot = document.getElementById(`marker-${i}`);
                const indicatorDot = document.getElementById(`dot-${i}`);
                
                if (markerDot) markerDot.classList.toggle('active', i === index);
                if (indicatorDot) indicatorDot.classList.toggle('active', i === index);
            }
        }

        // Calcular nivel desde posición del mouse/toque
        function getPositionFromEvent(clientX) {
            const rect = sliderTrack.getBoundingClientRect();
            const trackWidth = rect.width;
            const offsetX = clientX - rect.left;
            
            // Limitar entre 0 y trackWidth
            const clampedOffset = Math.max(0, Math.min(offsetX, trackWidth));
            
            // Calcular índice del nivel más cercano
            const ratio = clampedOffset / trackWidth;
            const levelIndex = Math.round(ratio * (sliderLevels.length - 1));
            
            return Math.max(0, Math.min(levelIndex, sliderLevels.length - 1));
        }

        // Mover slider a nivel específico
        function goToLevel(index) {
            if (index < 0 || index >= sliderLevels.length) return;
            currentLevel = index;
            renderLevel(index);
        }

        // ============================================
        // EVENTOS DE INTERACCIÓN
        // ============================================

        // Click en la pista del slider
        sliderTrack.addEventListener('click', (e) => {
            if (isDragging) return;
            const level = getPositionFromEvent(e.clientX);
            goToLevel(level);
        });

        // Inicio de arrastre con mouse
        sliderThumb.addEventListener('mousedown', (e) => {
            e.preventDefault();
            isDragging = true;
            startX = e.clientX;
            startLeft = sliderThumb.offsetLeft;
            sliderContainer.classList.add('dragging');
            sliderThumb.setPointerCapture?.(e.pointerId || 0);
        });

        // Inicio de arrastre con toque
        sliderThumb.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            startX = e.touches[0].clientX;
            startLeft = sliderThumb.offsetLeft;
            sliderContainer.classList.add('dragging');
        });

        // Movimiento durante arrastre (mouse)
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            
            const deltaX = e.clientX - startX;
            const trackWidth = sliderTrack.offsetWidth;
            const newLeft = Math.max(0, Math.min(startLeft + deltaX, trackWidth - sliderThumb.offsetWidth));
            
            // Calcular nivel más cercano
            const ratio = newLeft / (trackWidth - sliderThumb.offsetWidth);
            const level = Math.round(ratio * (sliderLevels.length - 1));
            
            // Actualizar visualmente sin cambiar contenido aún (para fluidez)
            sliderThumb.style.left = `${newLeft}px`;
            sliderProgress.style.width = `${(newLeft / (trackWidth - sliderThumb.offsetWidth)) * 100}%`;
            
            // Actualizar contenido solo si cambió de nivel
            if (level !== currentLevel) {
                goToLevel(level);
            }
        });

        // Movimiento durante arrastre (toque)
        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            
            const deltaX = e.touches[0].clientX - startX;
            const trackWidth = sliderTrack.offsetWidth;
            const newLeft = Math.max(0, Math.min(startLeft + deltaX, trackWidth - sliderThumb.offsetWidth));
            
            const ratio = newLeft / (trackWidth - sliderThumb.offsetWidth);
            const level = Math.round(ratio * (sliderLevels.length - 1));
            
            sliderThumb.style.left = `${newLeft}px`;
            sliderProgress.style.width = `${(newLeft / (trackWidth - sliderThumb.offsetWidth)) * 100}%`;
            
            if (level !== currentLevel) {
                goToLevel(level);
            }
        });

        // Fin de arrastre
        function endDrag() {
            if (isDragging) {
                isDragging = false;
                sliderContainer.classList.remove('dragging');
                // Asegurar que el thumb quede alineado con el nivel
                renderLevel(currentLevel);
            }
        }

        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
        document.addEventListener('touchcancel', endDrag);

        // Navegación con teclado en el slider
        sliderTrack.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentLevel > 0) {
                e.preventDefault();
                goToLevel(currentLevel - 1);
            }
            if (e.key === 'ArrowRight' && currentLevel < sliderLevels.length - 1) {
                e.preventDefault();
                goToLevel(currentLevel + 1);
            }
            if (e.key === 'Home') {
                e.preventDefault();
                goToLevel(0);
            }
            if (e.key === 'End') {
                e.preventDefault();
                goToLevel(sliderLevels.length - 1);
            }
        });

        // Botones de navegación
        prevBtn.addEventListener('click', () => {
            if (currentLevel > 0) goToLevel(currentLevel - 1);
        });

        nextBtn.addEventListener('click', () => {
            if (currentLevel < sliderLevels.length - 1) goToLevel(currentLevel + 1);
        });

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            // Renderizar primer nivel
            renderLevel(0);
            
            // Enfocar slider para accesibilidad con teclado
            sliderTrack.focus();
        });
    </script>
</body>
</html>
