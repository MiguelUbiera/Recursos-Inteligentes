<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego: Números racionales · Instituto Santa Rosa</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f0f4f8;  /* gris azulado muy suave */
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }

        .game-container {
            max-width: 900px;
            width: 100%;
            background-color: #ffffffd9;  /* blanco semitransparente para suavizar */
            backdrop-filter: blur(2px);
            border-radius: 40px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
            padding: 24px 24px 32px;
            border: 2px solid #c0cfde;    /* borde tenue */
        }

        /* Encabezado institucional */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .institution {
            font-size: 1.5rem;
            font-weight: 500;
            color: #1a3a5f;        /* azul oscuro pero suave */
            letter-spacing: 0.5px;
        }

        .teacher {
            font-size: 1.2rem;
            color: #2c4c6e;
            margin-top: 4px;
            font-weight: 400;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0b2b44;         /* alto contraste con fondo claro */
            margin: 8px 0 4px;
            text-shadow: 1px 1px 0 #eef5ff;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #1e3b5a;
            background: #d7e3f0;     /* suave contraste de fondo */
            display: inline-block;
            padding: 6px 20px;
            border-radius: 60px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        /* Área de puntuación y controles */
        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e9eff7;      /* muy suave */
            padding: 12px 24px;
            border-radius: 60px;
            margin: 20px 0 16px;
            border: 2px solid #b8c9dd;
        }

        .score-box {
            background: #1e3b5a;
            color: white;
            font-size: 2rem;
            font-weight: 700;
            padding: 8px 32px;
            border-radius: 48px;
            min-width: 120px;
            text-align: center;
            box-shadow: inset 0 -3px 0 #0a1c2b;
            letter-spacing: 2px;
        }

        .restart-btn {
            background: #f0f7ff;
            border: 3px solid #2f5575;
            color: #1e3b5a;
            font-size: 1.3rem;
            font-weight: 600;
            padding: 10px 30px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 0 #9bb0c7;
        }

        .restart-btn:hover {
            background: #ddeeff;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #9bb0c7;
        }

        .restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #9bb0c7;
        }

        /* Instrucciones visuales */
        .instructions {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin: 16px 0 24px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #17334f;
        }

        .correct-example {
            background: #c3e0d8;      /* verde agua suave */
            padding: 6px 18px;
            border-radius: 40px;
            border: 2px solid #1e6b5e;
        }

        .incorrect-example {
            background: #f1d7d7;      /* rosado suave */
            padding: 6px 18px;
            border-radius: 40px;
            border: 2px solid #aa4e4e;
        }

        /* Área de juego */
        .play-area {
            position: relative;
            width: 100%;
            height: 400px;
            background-color: #dbe7f3;   /* azul muy claro, tenue */
            border-radius: 60px;
            border: 4px solid #b4c8e0;
            overflow: hidden;             /* evita que los elementos salgan del área */
            box-shadow: inset 0 0 20px #b0c6dd;
            margin-top: 10px;
        }

        /* Estilo de cada "topo" (elemento) */
        .mole {
            position: absolute;
            width: 90px;
            height: 90px;
            background: #fffaec;          /* hueso claro */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #0b2b44;                /* azul oscuro, alto contraste */
            box-shadow: 0 8px 0 #7f8fa0, 0 12px 18px rgba(0, 20, 30, 0.2);
            border: 3px solid #2f5575;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            user-select: none;
            line-height: 1;
            padding: 4px;
            text-shadow: 2px 2px 0 white;
            will-change: left, top;
        }

        .mole:hover {
            transform: scale(1.05);
            background: #fffef7;
            box-shadow: 0 6px 0 #7f8fa0, 0 14px 20px rgba(0, 0, 0, 0.15);
        }

        .mole:active {
            transform: scale(0.95);
            box-shadow: 0 3px 0 #7f8fa0, 0 8px 12px rgba(0,0,0,0.1);
        }

        /* Distractor sutil (solo cambia el fondo para feedback rápido, sin audio) */
        .mole.distractor {
            background: #f7e3e3;
            border-color: #b16d6d;
            color: #4e2b2b;
        }

        /* Para mejorar identificación visual, pero mantenemos alto contraste */
        .footer {
            text-align: center;
            margin-top: 24px;
            color: #2f4d6a;
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .play-area { height: 300px; }
            .mole { width: 70px; height: 70px; font-size: 1.4rem; }
            .score-box { font-size: 1.6rem; padding: 8px 16px; }
            .title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="institution">Instituto para Sordos Santa Rosa</div>
            <div class="teacher">Profesor Miguel Ubiera</div>
            <div class="title">⚡ Números racionales ⚡</div>
            <div class="subtitle">Grado: [completar] · Asignatura: [completar]</div>
        </div>

        <!-- Puntuación visible -->
        <div class="score-panel">
            <span style="font-size: 1.6rem; font-weight:600; color:#1e3b5a;">🔢 Puntos</span>
            <div class="score-box" id="scoreDisplay">0</div>
            <button class="restart-btn" id="restartBtn">↻ Reiniciar</button>
        </div>

        <!-- Instrucciones 100% visuales -->
        <div class="instructions">
            <div class="correct-example">✅ Correcto: fracciones, decimales, enteros</div>
            <div class="incorrect-example">❌ Distractor: π, √2, e, etc.</div>
        </div>

        <!-- Área de juego donde aparecen los elementos -->
        <div id="playArea" class="play-area"></div>

        <div class="footer">
            Haz clic solo en números racionales — cada acierto suma 1, error resta 1 (mínimo 0)
        </div>
    </div>

    <script>
        (function() {
            // ---------- CONFIGURACIÓN DEL JUEGO ----------
            // Elementos correctos (racionales)
            const correctItems = [
                { text: "1/2", correct: true },
                { text: "0.5", correct: true },
                { text: "2/3", correct: true },
                { text: "0.75", correct: true },
                { text: "3/4", correct: true },
                { text: "2", correct: true },
                { text: "-1", correct: true },
                { text: "0.25", correct: true },
                { text: "1.5", correct: true },
                { text: "4/5", correct: true },
                { text: "1/3", correct: true },
                { text: "0.2", correct: true },
                { text: "0.125", correct: true },
                { text: "5/8", correct: true },
                { text: "7/2", correct: true },
                { text: "-3/4", correct: true }
            ];

            // Elementos distractores (irracionales o no racionales)
            const distractorItems = [
                { text: "π", correct: false },
                { text: "√2", correct: false },
                { text: "√3", correct: false },
                { text: "e", correct: false },
                { text: "√5", correct: false },
                { text: "√7", correct: false },
                { text: "√11", correct: false },
                { text: "π/2", correct: false },
                { text: "φ", correct: false },      // número áureo
                { text: "√13", correct: false }
            ];

            // Mezclamos ambos para tener variedad (se seleccionarán aleatoriamente)
            const allItems = [...correctItems, ...distractorItems];

            // ---------- VARIABLES DE ESTADO ----------
            let score = 0;
            let activeMoles = 0;
            const MAX_MOLES = 8;                // máximo de elementos visibles simultáneamente
            const MOLE_LIFETIME = 2200;          // 2.2 segundos antes de desaparecer solo
            const SPAWN_INTERVAL = 1000;          // aparece un nuevo elemento cada 1 segundo

            const playArea = document.getElementById('playArea');
            const scoreDisplay = document.getElementById('scoreDisplay');

            // Controladores de tiempo
            let spawnInterval = null;
            let moleTimeouts = new Set();         // para limpieza (opcional, pero usaremos referencia en cada mole)

            // ---------- FUNCIONES PRINCIPALES ----------

            // Actualiza el marcador en pantalla
            function updateScoreDisplay() {
                scoreDisplay.textContent = score;
            }

            // Ajusta la puntuación (suma si es correcto, resta si es incorrecto)
            function addScore(increment) {
                score = Math.max(0, score + increment);  // mínimo 0
                updateScoreDisplay();
            }

            // Elimina un elemento del área de juego
            function removeMole(moleElement) {
                if (!moleElement || !moleElement.parentNode) return;

                // Si tiene un timeout pendiente, lo cancelamos
                if (moleElement._timeoutId) {
                    clearTimeout(moleElement._timeoutId);
                    moleElement._timeoutId = null;
                }

                // Eliminar del DOM y actualizar contador
                if (moleElement.parentNode === playArea) {
                    playArea.removeChild(moleElement);
                    activeMoles = Math.max(0, activeMoles - 1);
                }
            }

            // Crea un nuevo "topo" en una posición aleatoria
            function spawnMole() {
                if (activeMoles >= MAX_MOLES) return;  // límite alcanzado

                // Seleccionar un elemento al azar (puede ser correcto o distractor)
                const randomIndex = Math.floor(Math.random() * allItems.length);
                const item = allItems[randomIndex];

                // Crear el elemento DOM
                const mole = document.createElement('div');
                mole.className = 'mole';
                if (!item.correct) {
                    mole.classList.add('distractor');   // clase opcional para diferenciar visualmente (suave)
                }
                mole.textContent = item.text;
                mole.setAttribute('data-correct', item.correct);

                // Posición aleatoria dentro del área (considerando tamaño del mole: 90x90)
                const areaWidth = playArea.clientWidth;
                const areaHeight = playArea.clientHeight;
                const moleSize = 90;  // width/height en px

                // Asegurar que quede completamente dentro (con un pequeño margen)
                const maxLeft = Math.max(0, areaWidth - moleSize);
                const maxTop = Math.max(0, areaHeight - moleSize);

                const left = Math.floor(Math.random() * (maxLeft + 1));
                const top = Math.floor(Math.random() * (maxTop + 1));

                mole.style.left = left + 'px';
                mole.style.top = top + 'px';

                // Agregar al área
                playArea.appendChild(mole);
                activeMoles++;

                // Programar desaparición automática después de MOLE_LIFETIME
                const timeoutId = setTimeout(() => {
                    removeMole(mole);
                }, MOLE_LIFETIME);
                mole._timeoutId = timeoutId;   // guardar referencia en el elemento

                // Evento de clic en el mole
                mole.addEventListener('click', function(e) {
                    e.stopPropagation();  // evitar que llegue al contenedor

                    // Verificar si el elemento todavía está en el DOM (por si acaso)
                    if (!mole.parentNode) return;

                    const esCorrecto = mole.getAttribute('data-correct') === 'true';
                    if (esCorrecto) {
                        addScore(1);
                    } else {
                        addScore(-1);
                    }

                    // Eliminar el mole inmediatamente (como si lo hubiera golpeado)
                    removeMole(mole);
                });
            }

            // Limpiar todos los moles y reiniciar el juego
            function restartGame() {
                // Detener el intervalo de spawn
                if (spawnInterval) {
                    clearInterval(spawnInterval);
                    spawnInterval = null;
                }

                // Eliminar todos los moles y sus timeouts
                const moles = playArea.querySelectorAll('.mole');
                moles.forEach(mole => {
                    if (mole._timeoutId) {
                        clearTimeout(mole._timeoutId);
                    }
                    mole.remove();
                });

                // Reiniciar contadores
                activeMoles = 0;
                score = 0;
                updateScoreDisplay();

                // Iniciar de nuevo el intervalo (con un pequeño retraso para evitar múltiples)
                setTimeout(() => {
                    if (!spawnInterval) {
                        spawnInterval = setInterval(spawnMole, SPAWN_INTERVAL);
                    }
                }, 100);
            }

            // Inicializar juego (primera vez o reinicio)
            function initGame() {
                restartGame();  // reinicia y deja el intervalo funcionando
            }

            // ---------- EVENTO DE BOTÓN REINICIAR ----------
            document.getElementById('restartBtn').addEventListener('click', function() {
                restartGame();
            });

            // ---------- AJUSTAR SPAWN CUANDO LA VENTANA CAMBIA DE TAMAÑO (OPCIONAL) ----------
            // No reiniciamos el juego, pero si el área se agranda o encoge,
            // los moles existentes conservan su posición relativa (pueden quedar fuera si se achica mucho).
            // Para una mejor experiencia, se podría reposicionar, pero lo dejamos así.

            // También aseguramos que al cargar la página se inicie correctamente.
            window.addEventListener('load', () => {
                // Pequeña demora para que el área tenga dimensiones correctas
                setTimeout(() => {
                    initGame();
                }, 150);
            });

            // Pausar intervalo si la pestaña no está activa (opcional, ahorro de recursos)
            // pero no necesario para la funcionalidad.

            // Exponer algunas variables para depuración (no necesario)
        })();
    </script>
</body>
</html>
