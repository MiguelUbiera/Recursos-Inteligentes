<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Visual: Números Irracionales</title>
    <style>
        :root {
            /* Paleta de colores suave y accesible */
            --bg-body: #f0f4f8;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-primary: #3b82f6; /* Azul accesible */
            --accent-secondary: #8b5cf6; /* Violeta */
            --accent-success: #10b981; /* Verde */
            --border-color: #e2e8f0;
            --shadow-soft: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --focus-outline: 3px solid #f59e0b; /* Ámbar para alto contraste */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        /* Encabezado */
        header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .institution {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .course-details {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 1rem;
            color: var(--text-muted);
            background: white;
            padding: 8px 16px;
            border-radius: 50px;
            display: inline-flex;
            box-shadow: var(--shadow-soft);
        }

        h1 {
            font-size: 2.2rem;
            color: var(--text-main);
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Contenedor de la Galería (Grid) */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }

        /* Tarjeta Individual */
        .gallery-item {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent-primary);
        }

        .gallery-item:focus {
            outline: var(--focus-outline);
            outline-offset: 4px;
        }

        /* Área de la imagen (Placeholder visual) */
        .item-image {
            height: 200px;
            background-color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }
        
        /* Simulación de imágenes con gradientes CSS para que funcione sin archivos externos */
        .img-sqrt2 { background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 100%); }
        .img-pi { background: linear-gradient(135deg, #fca5a5 0%, #ef4444 100%); }
        .img-golden { background: linear-gradient(135deg, #fcd34d 0%, #f59e0b 100%); }
        .img-decimals { background: linear-gradient(135deg, #6ee7b7 0%, #10b981 100%); }
        .img-fractal { background: linear-gradient(135deg, #c4b5fd 0%, #7c3aed 100%); }

        .item-image span {
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            z-index: 2;
        }

        .item-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .item-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .item-preview {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .view-btn {
            margin-top: auto;
            align-self: flex-start;
            background: var(--bg-body);
            color: var(--accent-primary);
            border: 2px solid var(--accent-primary);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .gallery-item:hover .view-btn {
            background: var(--accent-primary);
            color: white;
        }

        /* Modal / Lightbox (Ventana Emergente) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            padding: 20px 30px;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            border-radius: 20px 20px 0 0;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-primary);
        }

        .close-btn {
            background: #ef4444;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .close-btn:hover {
            transform: rotate(90deg);
            background: #dc2626;
        }

        .close-btn:focus {
            outline: var(--focus-outline);
        }

        .modal-body {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .modal-image-large {
            width: 100%;
            height: 300px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            color: white;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .modal-text {
            font-size: 1.2rem;
            color: var(--text-main);
            line-height: 1.7;
        }

        .modal-highlight {
            background: #eff6ff;
            border-left: 5px solid var(--accent-primary);
            padding: 15px;
            border-radius: 0 8px 8px 0;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.3rem;
            color: var(--text-main);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
            .modal-image-large {
                height: 200px;
                font-size: 3rem;
            }
            h1 { font-size: 1.8rem; }
        }

        /* Accesibilidad: Movimiento reducido */
        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; }
        }
    </style>
</head>
<body>

    <header>
        <div class="institution">Instituto para Sordos Santa Rosa</div>
        <div class="course-details">
            <span>🎓 1ro Secundaria</span>
            <span>📐 Matemáticas</span>
            <span>👨‍🏫 Prof. Miguel</span>
        </div>
        <h1>Galería Visual: Números Irracionales</h1>
        <p class="subtitle">Explora 5 conceptos clave a través de imágenes y explicaciones visuales. Haz clic en una tarjeta para ver los detalles.</p>
    </header>

    <main class="gallery-grid" id="galleryGrid">
        <!-- Las tarjetas se generan con JavaScript -->
    </main>

    <!-- Modal (Ventana Emergente) -->
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Título</h2>
                <button class="close-btn" id="closeBtn" aria-label="Cerrar ventana">×</button>
            </div>
            <div class="modal-body">
                <div class="modal-image-large" id="modalImage">
                    <!-- Imagen grande -->
                </div>
                <div class="modal-text" id="modalText">
                    <!-- Descripción -->
                </div>
                <div class="modal-highlight" id="modalMath">
                    <!-- Fórmula o dato clave -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // DATOS DE LA GALERÍA
        // Aquí puedes editar el texto y los colores de fondo de las imágenes
        const galleryData = [
            {
                id: 1,
                title: "La Raíz de 2 (√2)",
                preview: "El primer número irracional descubierto.",
                description: "Imagina un cuadrado donde cada lado mide 1. Si trazas una línea diagonal de esquina a esquina, esa línea mide exactamente √2. Los pitagóricos se sorprendieron al descubrir que este número no se podía escribir como fracción.",
                math: "Diagonal = √(1² + 1²) = √2 ≈ 1.414...",
                bgClass: "img-sqrt2",
                icon: "📐"
            },
            {
                id: 2,
                title: "El Número Pi (π)",
                preview: "La relación perfecta del círculo.",
                description: "Pi es la relación entre la longitud de cualquier circunferencia y su diámetro. No importa si el círculo es pequeño como una moneda o gigante como el planeta Tierra, esa división siempre da el mismo número irracional.",
                math: "Circunferencia ÷ Diámetro = π ≈ 3.14159...",
                bgClass: "img-pi",
                icon: "⭕"
            },
            {
                id: 3,
                title: "La Proporción Áurea (φ)",
                preview: "La belleza matemática en la naturaleza.",
                description: "También llamado 'Número de Oro'. Aparece en la espiral de las caracolas, en la disposición de las semillas del girasol y en la arquitectura clásica. Es un número irracional que representa armonía visual.",
                math: "φ (Phi) ≈ 1.618033...",
                bgClass: "img-golden",
                icon: "🐚"
            },
            {
                id: 4,
                title: "Decimales Infinitos",
                preview: "Números que nunca terminan.",
                description: "A diferencia de 0.5 que se detiene, los irracionales tienen una parte decimal que continúa para siempre sin repetir un patrón. Es como contar eternamente sin llegar al final.",
                math: "Ejemplo: 1.414213562373095...",
                bgClass: "img-decimals",
                icon: "♾️"
            },
            {
                id: 5,
                title: "Fractales",
                preview: "Formas complejas e irracionales.",
                description: "Los fractales son figuras geométricas que se repiten a diferentes escalas. Su dimensión a menudo es un número irracional. Se ven en las costas de los mapas, en los copos de nieve y en los relámpagos.",
                math: "Dimensión Fractal = Número Irracional",
                bgClass: "img-fractal",
                icon: "❄️"
            }
        ];

        // ELEMENTOS DEL DOM
        const galleryGrid = document.getElementById('galleryGrid');
        const modalOverlay = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('closeBtn');
        
        // Elementos internos del modal
        const modalTitle = document.getElementById('modalTitle');
        const modalImage = document.getElementById('modalImage');
        const modalText = document.getElementById('modalText');
        const modalMath = document.getElementById('modalMath');

        // FUNCIÓN: Renderizar la galería
        function renderGallery() {
            galleryData.forEach(item => {
                const card = document.createElement('article');
                card.className = 'gallery-item';
                card.setAttribute('tabindex', '0'); // Accesible con teclado
                card.setAttribute('role', 'button');
                card.setAttribute('aria-label', `Ver detalles de ${item.title}`);
                
                card.innerHTML = `
                    <div class="item-image ${item.bgClass}">
                        <span>${item.icon}</span>
                    </div>
                    <div class="item-content">
                        <h3 class="item-title">${item.title}</h3>
                        <p class="item-preview">${item.preview}</p>
                        <button class="view-btn">Ver Detalles 👁️</button>
                    </div>
                `;

                // Evento Click
                card.addEventListener('click', () => openModal(item));
                // Evento Teclado (Enter)
                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') openModal(item);
                });

                galleryGrid.appendChild(card);
            });
        }

        // FUNCIÓN: Abrir Modal
        function openModal(item) {
            modalTitle.textContent = item.title;
            modalText.textContent = item.description;
            modalMath.textContent = item.math;
            
            // Configurar imagen grande
            modalImage.className = `modal-image-large ${item.bgClass}`;
            modalImage.textContent = item.icon;

            // Mostrar modal
            modalOverlay.classList.add('active');
            
            // Accesibilidad: Enfocar botón de cerrar
            setTimeout(() => closeBtn.focus(), 100);
            
            // Bloquear scroll del body
            document.body.style.overflow = 'hidden';
        }

        // FUNCIÓN: Cerrar Modal
        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = 'auto'; // Restaurar scroll
        }

        // EVENT LISTENERS
        closeBtn.addEventListener('click', closeModal);
        
        // Cerrar al hacer clic fuera del contenido (en el fondo oscuro)
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // Cerrar con tecla Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                closeModal();
            }
        });

        // INICIALIZAR
        renderGallery();

    </script>
</body>
</html>
